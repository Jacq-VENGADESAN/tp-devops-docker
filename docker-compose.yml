version: "3.9"

services:
  database:
    build: ./database
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend/simple-api
    container_name: backend
    restart: unless-stopped
    depends_on:
      - database
    networks:
      - app-network

  httpd:
    build: ./httpd
    container_name: apache
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:

volumes:
  pgdata: